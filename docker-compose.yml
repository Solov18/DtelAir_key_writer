services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dtel}
      POSTGRES_USER: ${POSTGRES_USER:-dtel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-dtel} -d ${POSTGRES_DB:-dtel}
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  postgres_data:
